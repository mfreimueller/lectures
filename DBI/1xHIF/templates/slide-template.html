<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>%%WEEK_TITLE%%</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://mfreimueller.github.io/lectures/resources/theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reset.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.css">
</head>
<body>
    <div class="reveal">
        <div class="slides">

            <!-- FOLIEN WERDEN HIER EINGEFÜGT -->

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/highlight/highlight.min.js"></script>

    <script>
        Reveal.initialize({
            controls: true,
            progress: true,
            center: false,
            hash: true,
            slideNumber: 'c/t',
            transition: 'slide',
            backgroundTransition: 'fade',
            plugins: [RevealHighlight]
        });

        document.addEventListener('DOMContentLoaded', function() {
            const reveal = document.querySelector('.reveal');
            const footerHTML = `
                <div class="footer">
                    <div class="logo-container">
                        <img src="https://mfreimueller.github.io/lectures/resources/spengergasse_logo_300.png"
                             alt="HTL Spengergasse Logo" class="school-logo">
                    </div>
                    <span class="date">%%WEEK_TITLE%%</span>
                </div>
            `;
            reveal.insertAdjacentHTML('beforeend', footerHTML);
        });
    </script>
</body>
</html>
